<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4a4a48">
    <meta name="description" content="Коллекция зелий для D&D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>PotionWiki - Зелья D&D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PotionWiki</h1>
        <nav>
            <a href="index.html" class="active">Зелья</a>
            <a href="editor.html">Редактор</a>
        </nav>
    </header>

    <main>
        <section class="filters">
            <input type="text" id="search" placeholder="Поиск...">
            <div class="filter-group">
                <label>Свойства</label>
                <div class="multiselect" id="propertyMultiselect">
                    <button type="button" class="multiselect-toggle" id="propertyToggle">
                        <span id="propertyLabel">Все свойства</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="multiselect-dropdown" id="propertyDropdown"></div>
                </div>
            </div>
            <div class="filter-group">
                <label>Теги</label>
                <div class="multiselect" id="tagMultiselect">
                    <button type="button" class="multiselect-toggle" id="tagToggle">
                        <span id="tagLabel">Все теги</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="multiselect-dropdown" id="tagDropdown"></div>
                </div>
            </div>
            <div class="filter-group">
                <label>Обитание</label>
                <div class="multiselect" id="habitatMultiselect">
                    <button type="button" class="multiselect-toggle" id="habitatToggle">
                        <span id="habitatLabel">Все обитания</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="multiselect-dropdown" id="habitatDropdown"></div>
                </div>
            </div>
        </section>

        <section id="potionsList" class="potions-grid">
        </section>
    </main>

    <div id="potionModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <button id="editPotionBtn" class="modal-edit-btn">✏️ Редактировать</button>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modalName"></h2>
                    <p id="modalDescription"></p>
                    <div class="modal-tags" id="modalTags"></div>
                    <div class="modal-section">
                        <h3>Свойства</h3>
                        <ul id="modalProperties"></ul>
                    </div>
                    <div class="modal-section">
                        <h3>Состав</h3>
                        <ul id="modalIngredients"></ul>
                    </div>
                    <div class="modal-section">
                        <h3>Обитание</h3>
                        <ul id="modalHabitat"></ul>
                    </div>
                    <div class="modal-section">
                        <h3>Дополнительно</h3>
                        <p id="modalAdditional"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
